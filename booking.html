<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <section id="booking" class="booking-section">
        <h2>احجز مغامرتك الآن</h2>
        <p class="subtitle">قم بملء النموذج أدناه لتأكيد حجز مقعدك في رحلة درب الساكورا إلى اليابان.</p>
        
        <form class="booking-form">
            <div class="form-group">
                <label for="name">الاسم الكامل:</label>
                <input type="text" id="name" name="name" required placeholder="أدخل اسمك كما في جواز السفر">
            </div>
            
            <div class="form-group">
                <label for="email">البريد الإلكتروني:</label>
                <input type="email" id="email" name="email" required placeholder="example@domain.com">
            </div>
            
            <div class="form-group">
                <label for="phone">رقم الهاتف:</label>
                <input type="tel" id="phone" name="phone" required placeholder="01XXXXXXXXX">
            </div>
            
            <div class="form-group">
                <label for="travelers">عدد المسافرين:</label>
                <input type="number" id="travelers" name="travelers" min="1" required value="1">
            </div>
            
            <div class="form-group">
                <label for="date">تاريخ الانطلاق المفضل:</label>
                <input type="date" id="date" name="date" required>
            </div>
            
            <button type="submit" class="cta-button large">تأكيد الحجز</button>
            <p id="form-message" class="message"></p>
        </form>
    </section>
</main>


</body>
</html>
